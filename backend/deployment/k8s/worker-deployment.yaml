apiVersion: apps/v1
kind: Deployment
metadata:
  name: neoverse-worker
  namespace: neoverse-prod
  labels:
    app: neoverse-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neoverse-worker
  template:
    metadata:
      labels:
        app: neoverse-worker
    spec:
      containers:
      - name: worker
        image: gcr.io/neoverse/backend:latest
        imagePullPolicy: Always
        # This will run the async tasks like Simulation, Self-Evolution, PDF generation
        command: ["python", "worker_main.py"] 
        envFrom:
        - secretRef:
            name: neoverse-secrets
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4" # Workers handle heavy AI workloads and need higher burst limits
            memory: "8Gi"
        # Since this is a worker, we rely on a custom liveness check, not an HTTP endpoint
        # e.g., checking if the worker process is still alive and pinging Redis/EventBus
