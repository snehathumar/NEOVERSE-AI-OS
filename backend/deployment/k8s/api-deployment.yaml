apiVersion: apps/v1
kind: Deployment
metadata:
  name: neoverse-api
  namespace: neoverse-prod
  labels:
    app: neoverse-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: neoverse-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: neoverse-api
    spec:
      containers:
      - name: api
        image: gcr.io/neoverse/backend:latest
        imagePullPolicy: Always
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: neoverse-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: neoverse-api-service
  namespace: neoverse-prod
spec:
  selector:
    app: neoverse-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
